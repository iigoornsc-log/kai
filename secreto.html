<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quarto Vermelho 🔥</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style-home.css">
    
    <style>
        /* Fundo vermelho escuro/vinho pro clima esquentar */
        body {
            background: radial-gradient(circle, #3a0008 0%, #0a0000 100%);
            overflow-x: hidden;
        }

        /* =========================================
           TELA DE BLOQUEIO (SENHA)
           ========================================= */
        #lock-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100vh;
            background: rgba(10, 0, 0, 0.95);
            backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.8s ease, visibility 0.8s;
        }

        .lock-box {
            background: rgba(255, 0, 50, 0.05);
            border: 1px solid rgba(255, 0, 50, 0.2);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 0 30px rgba(255, 0, 50, 0.1);
        }

        .lock-box i {
            font-size: 3rem;
            color: #ff0055;
            margin-bottom: 20px;
            text-shadow: 0 0 15px #ff0055;
        }

        .lock-box h2 {
            font-family: 'Dancing Script', cursive;
            font-size: 2.5rem;
            color: #ff0055;
            margin-bottom: 10px;
        }

        .lock-box p {
            color: #aaa;
            margin-bottom: 25px;
            font-size: 0.9rem;
        }

        .password-input {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #ff0055;
            color: #fff;
            padding: 12px 20px;
            border-radius: 30px;
            font-size: 1.2rem;
            text-align: center;
            letter-spacing: 5px;
            outline: none;
            width: 200px;
            margin-bottom: 20px;
            box-shadow: inset 0 0 10px rgba(255, 0, 50, 0.2);
        }

        .btn-unlock {
            background: #ff0055;
            color: #fff;
            border: none;
            padding: 12px 30px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 15px rgba(255, 0, 85, 0.4);
        }

        .btn-unlock:hover {
            background: #cc0044;
            box-shadow: 0 0 25px rgba(255, 0, 85, 0.6);
        }

        /* Efeito de tremer quando erra a senha */
        .shake {
            animation: shakeError 0.4s;
        }
        @keyframes shakeError {
            0% { transform: translateX(0); }
            25% { transform: translateX(-10px); border-color: red; }
            50% { transform: translateX(10px); border-color: red; }
            75% { transform: translateX(-10px); border-color: red; }
            100% { transform: translateX(0); }
        }

        /* =========================================
           CONTEÚDO SECRETO (Escondido no início)
           ========================================= */
        #secret-content {
            display: none; /* Só aparece quando destrava */
            padding: 50px 20px;
            text-align: center;
            max-width: 800px;
            margin: 0 auto;
        }

        .secret-title {
            font-family: 'Dancing Script', cursive;
            font-size: 4rem;
            color: #ff0055;
            text-shadow: 0 0 20px rgba(255, 0, 85, 0.6);
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div id="lock-screen">
        <div class="lock-box" id="box-senha">
            <i class="fa-solid fa-fire"></i>
            <h2>Acesso Restrito</h2>
            <p>Insira o PIN de safadeza para continuar.</p>
            
            <input type="password" id="pass-input" class="password-input" placeholder="****" maxlength="4">
            <br>
            <button onclick="checkPassword()" class="btn-unlock">Destravar</button>
            <p id="error-msg" style="color: red; margin-top: 15px; opacity: 0; font-size: 0.8rem;">Senha incorreta!</p>
        </div>
    </div>

    <div id="secret-content">
        <h1 class="secret-title">O Quarto Vermelho</h1>
        <p style="color: #ccc; font-size: 1.1rem; line-height: 1.6;">Bem-vinda à nossa área VIP. O que acontece aqui, fica aqui.<br>Escolha seu brinquedo de hoje...</p>
        
        <br><br>
        <h2 style="color: #fff; font-weight: 300;">(Conteúdo da Roleta e Cupons em construção...)</h2>
        
        <br><br>
        <a href="home.html" style="color: #ff0055; text-decoration: none; border-bottom: 1px solid #ff0055;">Voltar ao Menu Seguro</a>
    </div>

    <script>
        // Mude a senha aqui! Coloquei "6969" de zoeira, mas põe a que você quiser.
        const senhaCorreta = "6969";

        function checkPassword() {
            const input = document.getElementById('pass-input').value;
            const lockBox = document.getElementById('box-senha');
            const errorMsg = document.getElementById('error-msg');

            if (input === senhaCorreta) {
                // ACERTOU! Esconde a tela de bloqueio e mostra o conteúdo
                document.getElementById('lock-screen').style.opacity = "0";
                setTimeout(() => {
                    document.getElementById('lock-screen').style.visibility = "hidden";
                    document.getElementById('secret-content').style.display = "block";
                }, 800);
            } else {
                // ERROU! Tremer a caixa
                lockBox.classList.add('shake');
                errorMsg.style.opacity = "1";
                document.getElementById('pass-input').value = ""; // limpa o campo
                
                // Tira a classe depois de tremer pra poder tremer de novo se errar
                setTimeout(() => {
                    lockBox.classList.remove('shake');
                }, 400);
            }
        }
    </script>
</body>
</html>
